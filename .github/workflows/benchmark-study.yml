name: Benchmark Study

# Reusable workflow for cross-runner variance analysis.
# Run this on a PR branch before merging a new benchmark to measure
# between-runner CoV and get recommended .gitperfconfig settings.
#
# Usage from an external repo:
#   jobs:
#     study:
#       uses: kaihowl/git-perf/.github/workflows/benchmark-study.yml@VERSION
#       with:
#         measurement: bench::my_benchmark/operation::median
#         mode: criterion-json
#         command: cargo criterion --bench my_benchmark --message-format json
#       secrets: inherit

on:
  workflow_dispatch:
    inputs:
      measurement:
        description: >
          Full measurement name (e.g. bench::add_measurements/add_measurement/50::median).
          Must match the name produced by the measure/import step.
        required: true
        type: string
      command:
        description: >
          measure mode: command whose wall-clock time is recorded
          (e.g. git -C $REPO perf add -m metric 123).
          criterion-json mode: cargo criterion command that writes JSON to stdout
          (e.g. cargo criterion --bench add --features test-helpers --message-format json).
        required: true
        type: string
      mode:
        description: >
          How measurements are collected.
          measure: git perf measure times the command (reps_per_instance runs stored).
          criterion-json: command is piped to git perf import criterion-json (one run per instance).
        required: false
        default: 'measure'
        type: choice
        options:
          - measure
          - criterion-json
      instances:
        description: Number of independent runner instances (≥ 3 required, 10 recommended)
        required: false
        default: '10'
        type: string
      reps_per_instance:
        description: >
          (measure mode only) Repetitions per runner instance passed to git perf measure -n.
          Ignored in criterion-json mode (criterion collects its own samples internally).
        required: false
        default: '10'
        type: string
      max_cov:
        description: >
          Fail if between-runner CoV exceeds this percentage (leave empty to only report).
          Recommended: 20 for a hard gate, or leave empty during initial exploration.
        required: false
        default: ''
        type: string

  workflow_call:
    inputs:
      measurement:
        required: true
        type: string
      command:
        required: true
        type: string
      mode:
        required: false
        default: 'measure'
        type: string
      instances:
        required: false
        default: '10'
        type: string
      reps_per_instance:
        required: false
        default: '10'
        type: string
      max_cov:
        required: false
        default: ''
        type: string

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          n="${{ inputs.instances }}"
          matrix=$(python3 -c "import json; n=int('$n'); print(json.dumps(list(range(1, n+1))))")
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  measure:
    needs: setup
    name: Measure (instance ${{ matrix.instance }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        instance: ${{ fromJSON(needs.setup.outputs.matrix) }}

    env:
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so git-perf can walk commits for push/pull
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install git-perf from master
        run: |
          cargo install --git https://github.com/kaihowl/git-perf --branch master git-perf
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cargo-criterion
        if: inputs.mode == 'criterion-json'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-criterion

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run benchmark (measure mode)
        if: inputs.mode != 'criterion-json'
        run: |
          git perf measure \
            -n "${{ inputs.reps_per_instance }}" \
            -m "${{ inputs.measurement }}" \
            --key-value group=${{ matrix.instance }} \
            -- ${{ inputs.command }}

      - name: Run benchmark (criterion-json mode)
        if: inputs.mode == 'criterion-json'
        run: |
          set -o pipefail
          ${{ inputs.command }} \
            | git perf import criterion-json - \
                --metadata group=${{ matrix.instance }}

      - name: Push measurements
        run: git perf push

  study:
    name: Analyze cross-runner variance
    runs-on: ubuntu-22.04
    needs: measure
    if: always() && needs.measure.result != 'cancelled'

    env:
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install git-perf from master
        run: |
          cargo install --git https://github.com/kaihowl/git-perf --branch master git-perf
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Pull measurements from all runners
        run: git perf pull

      - name: Run study analysis
        run: |
          MAX_COV_FLAG=""
          if [ -n "${{ inputs.max_cov }}" ]; then
            MAX_COV_FLAG="--max-cov ${{ inputs.max_cov }}"
          fi
          git perf study -m "${{ inputs.measurement }}" $MAX_COV_FLAG
