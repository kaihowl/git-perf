name: Baseline Reliability Experiment

concurrency:
  group: baseline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

on:
  push:
    branches:
      - baseline/*
  workflow_dispatch:

jobs:
  measure:
    name: measure
    runs-on: ubuntu-22.04
    env:
      RUST_BACKTRACE: 1

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 40

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: stable

    - name: Install cargo-criterion
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-criterion

    - name: Build git-perf
      run: cargo build --verbose

    - name: Run add benchmark and record measurement
      env:
        GIT_AUTHOR_NAME: github-actions[bot]
        GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        GIT_COMMITTER_NAME: github-actions[bot]
        GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      run: |
        set -euo pipefail
        cargo criterion --bench add --features test-helpers --message-format json > add-bench-results.json

        cargo run -- import criterion-json add-bench-results.json \
          --metadata ci=true \
          --metadata os=ubuntu-22.04 \
          --metadata rust=stable \
          --metadata baseline=true

        cargo run -- push || true
