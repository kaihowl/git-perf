\* TLC model checker configuration for GitPerfConcurrency.tla
\*
\* Run with:
\*   tlc GitPerfConcurrency.tla -config GitPerfConcurrency.cfg
\*
\* Or with the TLA+ Toolbox IDE: open the spec and create a model using
\* the values below.
\*
\* Expected result: no invariant violations (state space fully explored).
\*
\* State space size (approximate):
\*   2 adders + 1 pusher: ~tens of thousands of states (seconds to check)
\*   2 adders + 2 pushers: ~hundreds of thousands (minutes to check)

SPECIFICATION Spec

\* -----------------------------------------------------------------------
\* Constant assignments  (small model for fast TLC exploration)
\* -----------------------------------------------------------------------

\* Two adders: each writes exactly one measurement (its own ID as the value)
CONSTANT Adders = {a1, a2}

\* One pusher.  Increase to {p1, p2} to check concurrent-push scenarios
\* (significantly larger state space).
CONSTANT Pushers = {p1}

\* -----------------------------------------------------------------------
\* Invariants to check
\* -----------------------------------------------------------------------
INVARIANT Invariant

\* Individual invariants (also useful for debugging counterexamples)
INVARIANT NoMeasurementLost
INVARIANT SymrefValid
INVARIANT WriteRefsHaveValidContent
INVARIANT RemoteHasValidContent
INVARIANT UpstreamHasValidContent
